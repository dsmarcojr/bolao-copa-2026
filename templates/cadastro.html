{% extends "base.html" %}

{% block content %}
<div class="forms-container">
    <div class="card" id="register-card">
        <h2>Criar nova conta</h2>
        <form method="POST" action="/cadastro">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome" required minlength="3">
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="seunickname" required minlength="3">
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label for="senha">Sua Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Mínimo 8 caracteres" required minlength="8">
                <small style="color: #666; display: block; margin-top: 5px;">Mínimo de 8 caracteres, 1 maiúscula, 1 minúscula e 1 número.</small>
            </div>
            <button type="submit" class="btn">Registrar e Participar</button>
        </form>
    </div>
</div>
{% endblock %}
