<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão Copa 2026</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #3e7454;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: auto;
        }

        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin: 20px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        input[type="password"] {
            width: 80%;
            padding: 10px;
            margin: 20px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            background-color: #3e7454;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #5fb384;
        }
    </style>
</head>

<body>
    <div class="container" id="login-container">
        <h1>🏆 Bolão Copa 2026</h1>
        <p>Para começar a dar seus palpites, por favor, insira seu CPF e senha.</p>
        <form id="login-form">
            <input type="text" id="nome-participante" placeholder="Digite seu usuário" required>
            <input type="password" id="senha" placeholder="Digite sua senha" required>
            <br>
            <button type="submit">Entrar</button>
        </form>
    </div>

    <div class="classificacao" id="classificacao-container">
        <h1>Veja como está o bolão!</h1>
        <div style="display: flex; justify-content: center; gap: 15px;">
            <a href="classificacao.html"><button type="button">🏆 Classificação Geral</button></a>
            <a href="resultados.html"><button type="button" style="background-color: #2c3e50;">⚽ Resultados Oficiais</button></a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const nome = document.getElementById('nome-participante').value.trim();
            if (nome) {
                // Salvar o nome no localStorage para usar na próxima página
                localStorage.setItem('participante_atual', nome);
                alert(`Olá, ${nome}! O sistema de banco de dados e login já está pronto no motor.py.`);
                window.location.href = 'palpites.html';
            }
        });
    </script>
</body>

</html>
