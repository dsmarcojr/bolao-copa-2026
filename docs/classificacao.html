<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão Copa 2026 - Classificação</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #3e7454;
        }

        .dropdown-menu {
            text-align: center;
            margin-bottom: 20px;
        }

        .dropdown-menu a {
            text-decoration: none;
            color: #3e7454;
            font-weight: bold;
            margin: 0 10px;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .dropdown-menu a:hover {
            background-color: #e2ede6;
        }

        .classificacao-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: 0 auto 30px auto;
        }

        .classificacao-titulo {
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: #3e7454;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tabela-classificacao {
            width: 100%;
        }

        .usuario-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px dashed #eee;
        }

        .usuario-row:last-child {
            border-bottom: none;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .posicao {
            font-weight: bold;
            width: 40px;
            font-size: 1.1em;
            color: #3e7454;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: #e2ede6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #3e7454;
            border: 2px solid #3e7454;
        }

        .nome-usuario {
            font-size: 1.1em;
            font-weight: 500;
        }

        .pontuacao {
            font-weight: bold;
            font-size: 1.2em;
            color: #27ae60;
            width: 80px;
            text-align: right;
        }

        .status-top {
            color: #f1c40f;
            margin-left: 5px;
        }

        @media (max-width: 600px) {
            .classificacao-container {
                padding: 15px;
            }
            .nome-usuario {
                font-size: 1em;
            }
            .posicao {
                width: 30px;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>🏆 Classificação Geral</h1>
        <div class="dropdown-menu">
            <a href="index.html">Início</a>
            <a href="palpites.html">Meus Palpites</a>
            <a href="resultados.html">Resultados</a>
        </div>
    </header>

    <div class="classificacao-container">
        <div class="classificacao-titulo">
            <span>Ranking dos Participantes</span>
            <small id="atualizacao-info" style="font-weight: normal; color: #888;">Atualizado agora</small>
        </div>

        <div id="tabela-corpo" class="tabela-classificacao">
            <!-- Os usuários serão carregados aqui via JavaScript -->
            <p style="text-align: center;">Carregando classificação...</p>
        </div>
    </div>

    <script>
        // Mock data para simular a classificação
        const usuariosClassificacao = [
            { nome: "José Maria", pontos: 45, medalha: "🥇" },
            { nome: "Ana Silva", pontos: 42, medalha: "🥈" },
            { nome: "Carlos Lima", pontos: 38, medalha: "🥉" },
            { nome: "Beatriz Rocha", pontos: 35, medalha: "" },
            { nome: "Paulo Souza", pontos: 32, medalha: "" },
            { nome: "Mariana Costa", pontos: 30, medalha: "" },
            { nome: "Ricardo Alves", pontos: 28, medalha: "" },
            { nome: "Fernanda Dias", pontos: 25, medalha: "" }
        ];

        document.addEventListener('DOMContentLoaded', () => {
             renderizarClassificacao();
        });

        function renderizarClassificacao() {
            const container = document.getElementById('tabela-corpo');
            container.innerHTML = '';

            // Ordenar por pontos decrescente
            usuariosClassificacao.sort((a, b) => b.pontos - a.pontos);

            usuariosClassificacao.forEach((user, index) => {
                const row = document.createElement('div');
                row.className = 'usuario-row';
                
                // Pegar iniciais do nome para o avatar
                const iniciais = user.nome.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
                
                row.innerHTML = `
                    <div class="user-info">
                        <span class="posicao">${index + 1}º</span>
                        <div class="avatar">${iniciais}</div>
                        <span class="nome-usuario">${user.nome} ${user.medalha}</span>
                    </div>
                    <div class="pontuacao">
                        ${user.pontos} <span style="font-size: 0.6em; color: #888; font-weight: normal;">pts</span>
                    </div>
                `;
                container.appendChild(row);
            });
        }
    </script>
</body>

</html>
